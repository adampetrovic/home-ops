apiVersion: batch/v1
kind: Job
metadata:
  name: dedup-images
  namespace: media
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400  # Clean up after 24h
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-private
      # Prefer node-5 (20 CPU, 96GB RAM)
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8s-node-5
      containers:
        - name: dedup
          image: ghcr.io/adampetrovic/dedup-images:v2-1774155749
          args:
            - --media-dir=/media
            - --output=/output/dedup-output/duplicates.json
            - --cache-dir=/output/dedup-output/cache
            - --workers=10
            - --hamming-threshold=12
            - --clip-threshold=0.93
          resources:
            requests:
              cpu: "4"
              memory: 8Gi
            limits:
              cpu: "16"
              memory: 32Gi
          volumeMounts:
            - name: media
              mountPath: /media
              readOnly: true
            - name: output
              mountPath: /output
      volumes:
        - name: media
          nfs:
            server: nas-direct.petrovic.network
            path: /volume2/stash/media
            readOnly: true
        - name: output
          nfs:
            server: nas-direct.petrovic.network
            path: /volume2/stash
