---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${verifyJob}
  namespace: ${ns}
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: main
          image: ghcr.io/home-operations/busybox:1.37.0@sha256:026ed7273270ec08f6902b4ae8334c23b473e5394bec3bbbdbfe580c710d50bc
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "Restored PVC: ${claim}"
              echo "Top-level restored entries:"
              find /restore -mindepth 1 -maxdepth 2 -print | sed -n '1,20p'
              test -n "$(find /restore -mindepth 1 -maxdepth 1 -print -quit)"
          volumeMounts:
            - name: restore
              mountPath: /restore
              readOnly: true
          resources: {}
      volumes:
        - name: restore
          persistentVolumeClaim:
            claimName: ${claim}
            readOnly: true
