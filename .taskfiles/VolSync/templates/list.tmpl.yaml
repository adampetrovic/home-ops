---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${job}
  namespace: ${ns}
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: main
          # renovate: datasource=docker depName=ghcr.io/perfectra1n/volsync
          image: ghcr.io/perfectra1n/volsync:v0.17.11
          command:
            - /bin/sh
            - -c
            - |
              set -eo pipefail
              kopia repository connect filesystem \
                --path /repository \
                --override-username ${app} \
                --override-hostname ${ns} \
                --no-check-for-updates 2>&1 | grep -v "^$"
              echo ""
              printf "%-14s  %-22s  %s\n" "previous" "restoreAsOf (UTC)" "root"
              printf "%-14s  %-22s  %s\n" "--------" "-----------------" "----"
              kopia snapshot list ${app}@${ns}:/data 2>/dev/null \
                | awk 'BEGIN{n=0} / UTC /{gsub(/^ +/,""); printf "%-14s  %-22s  %s\n", "previous=" n, $1"T"$2"Z", $4; n++}'
          env:
            - name: KOPIA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${app}-volsync-secret
                  key: KOPIA_PASSWORD
          volumeMounts:
            - name: repository
              mountPath: /repository
          resources: {}
      volumes:
        - name: repository
          nfs:
            server: nas-direct.petrovic.network
            path: /volume2/kopia
