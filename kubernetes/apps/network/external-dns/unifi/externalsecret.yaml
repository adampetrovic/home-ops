---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-dns-unifi
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: unifi-dns-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: unifi-dns
        property: UNIFI_API_KEY
