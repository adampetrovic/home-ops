---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app adguard
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      adguard:
        type: statefulset
        replicas: 2
        strategy: RollingUpdate
        annotations:
          secret.reloader.stakater.com/reload: tls-adguard
        podDisruptionBudget:
          minAvailable: 1
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/controller: adguard
                  app.kubernetes.io/name: *app
        statefulset:
          podManagementPolicy: Parallel
          serviceName:
            identifier: headless
          persistentVolumeClaimRetentionPolicy:
            whenDeleted: Retain
            whenScaled: Retain
          volumeClaimTemplates:
            - name: data
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 5Gi
              # Clone the current single-pod PVC into each StatefulSet ordinal
              # on first creation. Keep the old `adguard` PVC around for rollback
              # until the active/active setup is validated.
              dataSource:
                kind: PersistentVolumeClaim
                name: adguard
              globalMounts:
                - path: /opt/adguardhome/conf
                  subPath: conf
                - path: /opt/adguardhome/work
                  subPath: work
        containers:
          app:
            image:
              repository: mirror.gcr.io/adguard/adguardhome
              tag: v0.107.76@sha256:7157eb1dc3b26c7af1d6898759a7b3f7d0fa09891fbd2d3caa6abc1057a9179b
            env:
              TZ: "${TZ}"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 443
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              startup:
                enabled: false

      sync:
        annotations:
          secret.reloader.stakater.com/reload: adguard-sync-secret
        containers:
          app:
            image:
              repository: ghcr.io/bakito/adguardhome-sync
              tag: v0.9.0@sha256:a4e63e705c5602b7bdd5a9554615a78125521273a7aa5da5831517780a06aee4
            args: ["run"]
            env:
              API_METRICS_ENABLED: "true"
              API_PORT: &syncPort 8080
              CONTINUE_ON_ERROR: "false"
              CRON: "*/15 * * * *"
              FEATURES_DHCP_SERVER_CONFIG: "false"
              FEATURES_DHCP_STATIC_LEASES: "false"
              FEATURES_PROTECTION_STATUS: "true"
              FEATURES_TLS_CONFIG: "true"
              HTTP_CLIENT_TIMEOUT: 10s
              LOG_FORMAT: json
              LOG_LEVEL: info
              ORIGIN_URL: http://adguard-0.adguard-headless.network.svc.cluster.local
              REPLICA1_URL: http://adguard-1.adguard-headless.network.svc.cluster.local
              RUN_ON_START: "true"
              TZ: "${TZ}"
            envFrom:
              - secretRef:
                  name: adguard-sync-secret
            probes:
              liveness: &syncProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *syncPort
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *syncProbe
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault

    service:
      app:
        forceRename: *app
        controller: adguard
        extraSelectorLabels:
          apps.kubernetes.io/pod-index: "0"
        ports:
          http:
            port: 80
      dns:
        controller: adguard
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: dns.${SECRET_DOMAIN}
          lbipam.cilium.io/ips: 10.0.88.53
        ports:
          dns-https:
            port: 443
            protocol: TCP
          dns-tcp:
            port: 53
            protocol: TCP
          dns-udp:
            port: 53
            protocol: UDP
          tls-tcp:
            port: 853
            protocol: TCP
      headless:
        controller: adguard
        clusterIP: None
        publishNotReadyAddresses: true
        ports:
          http:
            port: 80
          setup:
            port: 3000
      sync:
        controller: sync
        ports:
          http:
            port: *syncPort

    serviceMonitor:
      sync:
        enabled: true
        serviceName: adguard-sync
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    route:
      main:
        annotations:
          gatus.home-operations.com/enabled: "true"
        hostnames:
          - "adguard.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      tls:
        enabled: true
        type: secret
        name: tls-adguard
        advancedMounts:
          adguard:
            app:
              - path: /opt/adguardhome/ssl/certs/
                readOnly: true
