---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app multus
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      multus:
        type: daemonset
        initContainers:
          cni-plugins:
            image:
              repository: ghcr.io/home-operations/cni-plugins
              tag: 1.9.1@sha256:56222d9cf686632f0951103a400adeeec8d982aaf8cbf4d21588da17a41dd228
        containers:
          multus:
            image:
              repository: ghcr.io/k8snetworkplumbingwg/multus-cni
              tag: v4.3.0@sha256:ec4e5dfe12b675e4dcbf4e9cd14892f7b4c8ac27aa0dc93cf2e9be0bdd7d764a
            args: []
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 32Mi
            securityContext:
              # Required for Multus to install/manage host CNI configuration and binaries.
              privileged: true
        serviceAccount:
          identifier: *app
    defaultPodOptions:
      # Required so the Multus daemonset can watch NetworkAttachmentDefinitions and operate as the node CNI delegate.
      automountServiceAccountToken: true
      # Required for node-level CNI installation/configuration.
      hostNetwork: true
    persistence:
      etc-cni-net-d:
        # Required to write Multus CNI config on each node.
        type: hostPath
        hostPath: /etc/cni/net.d
        globalMounts:
          - path: /host/etc/cni/net.d
      opt-cni-bin:
        # Required to install CNI binaries on each node.
        type: hostPath
        hostPath: /opt/cni/bin
        globalMounts:
          - path: /host/opt/cni/bin
    serviceAccount:
      multus: {}
    rbac:
      roles:
        multus:
          type: ClusterRole
          rules:
            - apiGroups:
                - "k8s.cni.cncf.io"
              resources:
                - "*"
              verbs:
                - "*"
            - apiGroups:
                - ""
              resources:
                - "pods"
                - "pods/status"
              verbs:
                - "get"
                - "update"
            - apiGroups:
                - ""
                - "events.k8s.io"
              resources:
                - "events"
              verbs:
                - "create"
                - "patch"
                - "update"
      bindings:
        multus:
          type: ClusterRoleBinding
          roleRef:
            kind: ClusterRole
            name: multus
            apiGroup: rbac.authorization.k8s.io
          subjects:
            - kind: ServiceAccount
              name: multus
              namespace: network
