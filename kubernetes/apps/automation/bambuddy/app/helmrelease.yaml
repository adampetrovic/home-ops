# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-private
    controllers:
      bambuddy:
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: 0.2.4@sha256:c3f7f758f0b6ac2a074e7277074b2d0150dfe81b190a44b551ab092a5d17ca6c
            env:
              TZ: ${TZ}
              PUID: 568
              PGID: 568
              HOME: /tmp
              PORT: &port 8000
              LOG_LEVEL: INFO
              # Optional server-side Bambu Studio slicer sidecar; enable in Settings → Slicer → Use Slicer API.
              SLICER_API_URL: http://127.0.0.1:3000
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
            securityContext:
              # Upstream sets cap_net_bind_service on Python; the container must allow
              # that file capability at exec time even though Bambuddy only serves :8000 here.
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_BIND_SERVICE
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          bambu-studio-api:
            image:
              repository: ghcr.io/adampetrovic/bambu-studio-api
              tag: 02.06.00.51@sha256:e7c4d813c940d132b4d29969d50484efdd850d72088413271ef07ad9504f3b20
            env:
              NODE_ENV: production
              PORT: &slicerPort 3000
              HOME: /tmp
              XDG_CONFIG_HOME: /tmp/.config
              XDG_CACHE_HOME: /tmp/.cache
              XDG_DATA_HOME: /tmp/.local/share
            probes:
              liveness: &slicerProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *slicerPort
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *slicerProbes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *slicerPort
                  periodSeconds: 10
                  timeoutSeconds: 10
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: bambuddy
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - bambuddy.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        enabled: true
        existingClaim: bambuddy
        advancedMounts:
          bambuddy:
            app:
              - path: /app/data
                subPath: data
              - path: /app/logs
                subPath: logs
            bambu-studio-api:
              - path: /app/data
                subPath: slicer-api/bambu-studio
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
