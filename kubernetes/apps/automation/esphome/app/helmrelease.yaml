---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: esphome
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      esphome:
        containers:
          app:
            image:
              repository: mirror.gcr.io/esphome/esphome
              tag: 2026.7.1@sha256:1e5733e32d8d7919f1fe2d592e63b2d9f2d0f0c22d9b478f9365fd814fb3f87d
            env:
              ESPHOME_DASHBOARD_USE_PING: true
              PLATFORMIO_CORE_DIR: .plattformio
              PLATFORMIO_GLOBALLIB_DIR: .plattformioLibs
              HOME: /tmp
            resources:
              requests:
                cpu: 407m
                memory: 2Gi
              limits:
                memory: 6Gi
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.128.0-39@sha256:caddbeb8aa09bf1ef255f37ed367f66aae2c77af5aa6d240c64a0a9f1579fc31
            env:
              TZ: "${TZ}"
              GIT_AUTHOR_NAME: "Adam Petrovic"
            args:
              - --auth
              - "none"
              - --user-data-dir
              - "/config/.vscode"
              - --extensions-dir
              - "/config/.vscode"
              - /config
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: |
              [{
                "name":"multus-trusted",
                "namespace": "network",
                "ips": ["10.0.10.101/23"],
                "mac": "9a:d4:f2:54:5a:98"
              }]
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: esphome
        ports:
          http:
            port: 6052
      codeserver:
        controller: esphome
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - esphome.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
      codeserver:
        hostnames:
          - "esphome-code.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: codeserver
                port: http
    persistence:
      config:
        enabled: true
        existingClaim: esphome
      cache:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /config/.esphome
