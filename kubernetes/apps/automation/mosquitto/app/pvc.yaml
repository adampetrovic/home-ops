---
# Mosquitto is intentionally on CephFS/RWX rather than the default
# Ceph RBD/RWO storage. The broker remains a singleton, but CephFS avoids
# exclusive RBD attach/detach delays during Talos node drains or powercycles,
# so retained MQTT state can be remounted on another node quickly.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-cephfs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ceph-filesystem
  resources:
    requests:
      storage: 1Gi
