# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sigenergy2mqtt
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      sigenergy2mqtt:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mirror.gcr.io/seud0nym/sigenergy2mqtt
              tag: 2026.4.16@sha256:6448d13d5ee03e003d33b2b5a01eeb80ef8e85c702eb374a1732ad9bcc270fce
            env:
              TZ: "${TZ}"

              # ── Modbus ──
              SIGENERGY2MQTT_MODBUS_HOST: "${SECRET_SIGENERGY_IP}"
              SIGENERGY2MQTT_MODBUS_PORT: "502"
              SIGENERGY2MQTT_MODBUS_INVERTER_DEVICE_ID: "1"

              # ── MQTT ──
              SIGENERGY2MQTT_MQTT_BROKER: "mosquitto.automation.svc.cluster.local"
              SIGENERGY2MQTT_MQTT_PORT: "1883"

              # ── Home Assistant ──
              SIGENERGY2MQTT_HASS_ENABLED: "true"
              SIGENERGY2MQTT_HASS_ENTITY_ID_PREFIX: "sigen"
              SIGENERGY2MQTT_HASS_UNIQUE_ID_PREFIX: "sigen"

              # ── InfluxDB v2 ──
              SIGENERGY2MQTT_INFLUX_ENABLED: "true"
              SIGENERGY2MQTT_INFLUX_HOST: "influxdb.observability.svc.cluster.local"
              SIGENERGY2MQTT_INFLUX_PORT: "8086"
              SIGENERGY2MQTT_INFLUX_BUCKET: "sigenergy"

              # ── PVOutput ──
              # Replaces the native IotaWatt → PVOutput uploader (disabled 2026-04-08
              # because the solar CTs were physically disconnected from IotaWatt).
              # Also replaces the HA tariff-feed automation in packages/energy/pvoutput.yaml.
              SIGENERGY2MQTT_PVOUTPUT_ENABLED: "true"
              SIGENERGY2MQTT_PVOUTPUT_CONSUMPTION: "true"     # send raw consumption (v4)
              SIGENERGY2MQTT_PVOUTPUT_EXPORTS: "true"          # split exports by tariff
              SIGENERGY2MQTT_PVOUTPUT_IMPORTS: "true"          # split imports by tariff
              SIGENERGY2MQTT_PVOUTPUT_OUTPUT_HOUR: "23"        # send daily totals at 11pm
              SIGENERGY2MQTT_PVOUTPUT_VOLTAGE: "l/n-avg"       # line-to-neutral average
              SIGENERGY2MQTT_PVOUTPUT_LOG_LEVEL: "INFO"
              # OVO EV Plan tariff windows (covers 2026-2027).
              # Maps OVO rates to sigenergy2mqtt's 4 tariff types:
              #   off-peak      = OVO Super Off-Peak ($0.00, 11:00-14:00)
              #   shoulder      = OVO EV Off-Peak    ($0.08, 00:00-06:00)
              #   high-shoulder = OVO Off-Peak       ($0.4081)
              #   peak          = OVO Peak           ($0.6127, 15:00-21:00 in peak season)
              # Peak season: Jan-Mar, Jun-Aug, Nov-Dec. Shoulder season: Apr-May, Sep-Oct.
              # NOTE: These windows must match your PVOutput Tariff Windows configuration.
              SIGENERGY2MQTT_PVOUTPUT_PERIODS_JSON: >-
                [{"plan":"OVO EV 2026 Peak Jan-Mar","from-date":"2026-01-01","to-date":"2026-03-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"peak","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2026 Shoulder Apr-May","from-date":"2026-04-01","to-date":"2026-05-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"high-shoulder","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2026 Peak Jun-Aug","from-date":"2026-06-01","to-date":"2026-08-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"peak","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2026 Shoulder Sep-Oct","from-date":"2026-09-01","to-date":"2026-10-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"high-shoulder","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2026 Peak Nov-Dec","from-date":"2026-11-01","to-date":"2026-12-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"peak","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2027 Peak Jan-Mar","from-date":"2027-01-01","to-date":"2027-03-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"peak","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2027 Shoulder Apr-May","from-date":"2027-04-01","to-date":"2027-05-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"high-shoulder","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2027 Peak Jun-Aug","from-date":"2027-06-01","to-date":"2027-08-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"peak","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2027 Shoulder Sep-Oct","from-date":"2027-09-01","to-date":"2027-10-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"high-shoulder","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]},{"plan":"OVO EV 2027 Peak Nov-Dec","from-date":"2027-11-01","to-date":"2027-12-31","default":"high-shoulder","periods":[{"type":"shoulder","start":"00:00","end":"06:00"},{"type":"high-shoulder","start":"06:00","end":"11:00"},{"type":"off-peak","start":"11:00","end":"14:00"},{"type":"high-shoulder","start":"14:00","end":"15:00"},{"type":"peak","start":"15:00","end":"21:00"},{"type":"high-shoulder","start":"21:00","end":"24:00"}]}]

              # ── Logging ──
              SIGENERGY2MQTT_LOG_LEVEL: "INFO"

            envFrom:
              - secretRef:
                  name: sigenergy2mqtt-secret
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch

    # Stateless — persistent state stored in /data
    persistence:
      data:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /data

    # No web UI — no service or route needed
