---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: camera-view
  namespace: automation
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - babycam.${SECRET_DOMAIN}
  rules:
    # go2rtc API + WebSocket (proxied same-origin)
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: go2rtc
          port: 80
    # Static files
    - backendRefs:
        - name: camera-view
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: camera-view
  namespace: automation
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: camera-view
  useClientProtocol: true
