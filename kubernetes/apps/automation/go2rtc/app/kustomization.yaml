---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
components:
  - ../../../../components/authelia-proxy
configMapGenerator:
  - name: go2rtc-configmap
    files:
      - go2rtc.yaml=./resources/go2rtc.yaml
  - name: go2rtc-loki-rules
    files:
      - go2rtc.yaml=./lokirule.yaml
    options:
      labels:
        loki_rule: "true"
generatorOptions:
  disableNameSuffixHash: true
