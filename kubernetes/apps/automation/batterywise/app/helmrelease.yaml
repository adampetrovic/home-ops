---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app batterywise
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      batterywise:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mirror.gcr.io/library/golang
              tag: 1.24-alpine@sha256:8bee1901f1e530bfb4a7850aa7a479d17ae3a18beb6e09064ed54cfd245b7191
            command: ["/bin/sh", "-c"]
            args:
              - >-
                set -eu;
                rm -rf /work/*;
                cp /src-config/* /work/;
                mkdir -p /work/web;
                cp /web-config/* /work/web/;
                cd /work;
                go build -trimpath -o /tmp/batterywise .;
                exec /tmp/batterywise
            env:
              TZ: ${TZ}
              PORT: &port 8080
              CONFIG_DIR: /config
              HOME: /tmp
              GOPATH: /tmp/go
              GOCACHE: /tmp/go-build
              GOMODCACHE: /tmp/go/pkg/mod
              CGO_ENABLED: "0"
              GOTOOLCHAIN: local
            envFrom:
              - secretRef:
                  name: batterywise-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/data/status
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/data/status
                    port: *port
                  periodSeconds: 5
                  timeoutSeconds: 2
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
            resources:
              requests:
                cpu: 25m
                memory: 512Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "batterywise.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /config
      src:
        enabled: true
        type: configMap
        name: batterywise-src
        globalMounts:
          - path: /src-config
            readOnly: true
      web:
        enabled: true
        type: configMap
        name: batterywise-web
        globalMounts:
          - path: /web-config
            readOnly: true
      work:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /work
      tmp:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /tmp
