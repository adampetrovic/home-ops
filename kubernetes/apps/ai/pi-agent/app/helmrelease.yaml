---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pi-agent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 3
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      pi-agent:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/adampetrovic/pi-agent-rpc-server
              tag: 0.1.0
            env:
              PI_RPC_PORT: "3100"
              PI_CODING_AGENT_DIR: /data/pi-agent
              PI_ARGS: "--mode rpc --no-session --no-tools --no-extensions --no-skills --no-prompt-templates --no-themes --model anthropic/claude-sonnet-4-5"
              PI_AUTH_JSON:
                valueFrom:
                  secretKeyRef:
                    name: pi-agent-secret
                    key: PI_AUTH_JSON
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3100
                  initialDelaySeconds: 15
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 3100
                  initialDelaySeconds: 10
                  periodSeconds: 10
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

    service:
      app:
        controller: pi-agent
        ports:
          http:
            port: 3100

    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /data/pi-agent

      agents:
        type: configMap
        name: pi-agent-agents
        globalMounts:
          - path: /app/AGENTS.md
            subPath: AGENTS.md
            readOnly: true
