---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pi-telegram-agent
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-private
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      pi-telegram-agent:
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: Recreate
        containers:
          agent:
            image:
              repository: ghcr.io/adampetrovic/pi-telegram-bot
              tag: v1.0.16@sha256:f8ff716f71b732ffccf0f0f1642c0b12a2db6c5bb5a3d1d64b573f7f707571a7
            env:
              TZ: ${TZ}
              HOME: /config
              PI_BIN: pi
              PI_CODING_AGENT_DIR: /config/.pi/agent
              PI_TELEGRAM_BOT_CONFIG: /config/pi-telegram-bot/config.yaml
              PI_TELEGRAM_SUMMARIZER_MODEL: openai-codex/gpt-5.4-mini
              PI_SKIP_VERSION_CHECK: "1"
              PI_TELEMETRY: "0"
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      code:
        existingClaim: *app
        globalMounts:
          - path: /config/code
            subPath: code
      ssh:
        existingClaim: *app
        globalMounts:
          - path: /config/.ssh
            subPath: ssh
      cache:
        existingClaim: *app
        globalMounts:
          - path: /config/.cache
            subPath: cache
      home-config:
        existingClaim: *app
        globalMounts:
          - path: /config/.config
            subPath: config
      pi-agent:
        existingClaim: *app
        globalMounts:
          - path: /config/.pi/agent
            subPath: pi-agent
      pi-telegram-sessions:
        existingClaim: *app
        globalMounts:
          - path: /config/.local/share/pi-telegram-bot/sessions
            subPath: pi-telegram-bot-sessions
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      pi-config:
        type: configMap
        name: pi-telegram-agent-configmap
        globalMounts:
          - path: /config/.pi/agent/settings.json
            subPath: settings.json
            readOnly: true
      bot-config:
        type: secret
        name: pi-telegram-agent-secret
        globalMounts:
          - path: /config/pi-telegram-bot/config.yaml
            subPath: config.yaml
            readOnly: true
