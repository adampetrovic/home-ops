# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gdb-scraper
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-private
    controllers:
      mms:
        type: cronjob
        cronjob:
          schedule: "0 6 * * 1"      # Monday 6am AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: &image
              repository: ghcr.io/adampetrovic/gdb-scraper
              tag: 0.1.64@sha256:57f6651a3b8543a1d69876f7ca80b346d512ead97cc5b5624807fde1c24419e1
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: mms
              MMS_INCREMENTAL_STRATEGY: new-only
              MMS_INCREMENTAL_LOOKBACK_DAYS: "120"
              MMS_INCREMENTAL_MANIFEST_ENABLED: "true"
              MMS_INCREMENTAL_MANIFEST_DIR: /export/mms-cache/manifests
              MMS_PARSED_CACHE_ENABLED: "true"
              MMS_PARSED_CACHE_DIR: /export/mms-cache/parsed-meets
              MMS_PARSED_CACHE_VALIDATE_GYMNAST_COUNT: "true"
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
      mso:
        type: cronjob
        cronjob:
          schedule: "0 18 * * 3"      # Wednesday 6pm AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: *image
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: mso
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
      usag:
        type: cronjob
        cronjob:
          schedule: "0 12 * * 0"      # Sunday 12pm AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: *image
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: usag
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
    persistence:
      export:
        existingClaim: gdb-scraper
