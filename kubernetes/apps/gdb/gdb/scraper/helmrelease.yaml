# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gdb-scraper
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: -1
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-private
    controllers:
      mms:
        type: cronjob
        cronjob:
          schedule: "0 6 * * 1"      # Monday 6am AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: &image
              repository: ghcr.io/adampetrovic/gdb-scraper
              tag: 0.1.72@sha256:e94b4f59740ec3408ba2e82d862fac9db10b21701773e787a5094d2c61c5cac8
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: mms
              MMS_INCREMENTAL_STRATEGY: new-only
              MMS_INCREMENTAL_LOOKBACK_DAYS: "120"
              MMS_INCREMENTAL_MANIFEST_ENABLED: "true"
              MMS_INCREMENTAL_MANIFEST_DIR: /export/mms-cache/manifests
              MMS_PARSED_CACHE_ENABLED: "true"
              MMS_PARSED_CACHE_DIR: /export/mms-cache/parsed-meets
              MMS_PARSED_CACHE_VALIDATE_GYMNAST_COUNT: "true"
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
      mms-raw-replay:
        type: cronjob
        cronjob:
          schedule: "0 0 1 1 *"      # Manual only: create Job from this suspended CronJob
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 3
        containers:
          scraper:
            image: *image
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              SOURCE: mms
              MODE: full
              MMS_CACHE_MODE: replay-cache
              MMS_CACHE_DIR: /export/mms-cache/raw
              YEARS: "2025,2024,2023,2022,2021,2020,2019,2018,2017,2016,2015,2014,2013,2012,2011,2010,2009,2008,2007,2006,2005,2004,2003,2002,2001,2000"
              GDB_DISABLE_NETWORK_FETCHES: "true"
              MMS_OFFLINE_REPLAY: "true"
            resources:
              requests:
                memory: 12Gi
              limits:
                memory: 24Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
      mso-fetch-cache:
        type: cronjob
        cronjob:
          schedule: "0 18 * * 3"      # Wednesday 6pm AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: *image
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: mso
              MSO_CACHE_MODE: fetch-cache
              MSO_CACHE_DIR: /export/mso-cache
              CONCURRENT_REQUESTS: "10"
              http_proxy:
                valueFrom:
                  secretKeyRef:
                    name: gdb-secret
                    key: EXTERNAL_PROXY_URL
              https_proxy:
                valueFrom:
                  secretKeyRef:
                    name: gdb-secret
                    key: EXTERNAL_PROXY_URL
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
      mso-replay-cache:
        type: cronjob
        cronjob:
          schedule: "0 0 * * 4"       # Thursday midnight AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: *image
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: mso
              MSO_CACHE_MODE: replay-cache
              MSO_CACHE_DIR: /export/mso-cache
              GDB_DISABLE_NETWORK_FETCHES: "true"
              MSO_OFFLINE_REPLAY: "true"
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
      usag:
        type: cronjob
        cronjob:
          schedule: "0 12 * * 0"      # Sunday 12pm AEST
          timeZone: "Australia/Sydney"
          suspend: true
          concurrencyPolicy: Forbid
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          scraper:
            image: *image
            envFrom:
              - secretRef:
                  name: gdb-secret
            env:
              OUTPUT_DIR: /export
              MODE: incremental
              SOURCE: usag
            resources:
              requests:
                memory: 3Gi
              limits:
                memory: 4Gi
        pod:
          restartPolicy: Never
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]
    persistence:
      export:
        existingClaim: gdb-scraper
