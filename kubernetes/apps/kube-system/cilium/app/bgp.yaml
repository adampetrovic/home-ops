---
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: ucg-fiber
spec:
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          advertise: bgp
---
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: ucg-fiber
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: cilium
      localASN: 64514
      peers:
        - name: ucg-fiber
          peerASN: 64513
          peerAddress: "10.0.87.1"
          peerConfigRef:
            name: ucg-fiber
---
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: loadbalancers
  labels:
    advertise: bgp
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      selector:
        matchExpressions:
          # Match all Services. Only Services with LoadBalancer IPs are advertised.
          - key: io.kubernetes.service.name
            operator: NotIn
            values:
              - never-used-service-name
