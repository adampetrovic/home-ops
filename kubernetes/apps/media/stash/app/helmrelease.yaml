---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stash
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  maxHistory: 2
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      stash:
        annotations:
          reloader.stakater.com/auto: 'true'
        initContainers:
          01-init-config:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df
            command:
              - /bin/sh
              - -ec
            args:
              - |
                mkdir -p /config /generated /metadata /cache /blobs
                if [ ! -s /config/config.yml ]; then
                  cat > /config/config.yml <<'EOF'
                host: 0.0.0.0
                port: 9999
                database: /config/stash-go.sqlite
                generated: /generated
                metadata: /metadata
                cache: /cache
                blobs_path: /blobs
                stash:
                  - /media
                EOF
                fi
        containers:
          app:
            image:
              repository: mirror.gcr.io/stashapp/stash
              tag: v0.31.1@sha256:df744af5a0c976e2ec671052ecc1f8a9aa757fa12b8f9930b59910b7295f0da6
            env:
              TZ: "${TZ}"
              STASH_CONFIG_FILE: /config/config.yml
              USER: stash
              HOME: /config
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 9999
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
            supplementalGroups: [100]

    service:
      app:
        controller: stash
        ports:
          http:
            port: *port

    route:
      main:
        hostnames:
          - stash.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network

    persistence:
      config:
        enabled: true
        existingClaim: stash
        advancedMounts:
          stash:
            01-init-config:
              - path: /config
                subPath: config
              - path: /generated
                subPath: generated
              - path: /metadata
                subPath: metadata
              - path: /cache
                subPath: cache
              - path: /blobs
                subPath: blobs
            app:
              - path: /config
                subPath: config
              - path: /generated
                subPath: generated
              - path: /metadata
                subPath: metadata
              - path: /cache
                subPath: cache
              - path: /blobs
                subPath: blobs
      data:
        type: nfs
        server: ${SECRET_NFS_DOMAIN}
        path: /volume2/stash
        advancedMounts:
          stash:
            app:
              - path: /media
      tmp:
        type: emptyDir
        advancedMounts:
          stash:
            app:
              - path: /tmp
