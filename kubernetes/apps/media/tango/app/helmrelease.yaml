---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tango
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      imagePullSecrets:
        - name: ghcr-private
    controllers:
      tango:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          install-plugins:
            image:
              repository: alpine
              tag: 3.23
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache git
                rm -rf /tmp/tango-plugins
                git clone --depth 1 https://github.com/adampetrovic/stash-plugins.git /tmp/tango-plugins
                for plugin in /tmp/tango-plugins/plugins/*/; do
                  name=$(basename "$plugin")
                  mkdir -p "/root/.stash/plugins/$name"
                  cp -r "$plugin"* "/root/.stash/plugins/$name/"
                  echo "Installed plugin: $name"
                done
                rm -rf /tmp/tango-plugins
        containers:
          app:
            image:
              repository: ghcr.io/adampetrovic/tango
              tag: v0.30.1@sha256:bb98adb1eafd83f6bfc67b58fe98cde87d063d1bd1612b28f6dbfa870320a71f
            env:
              TZ: "${TZ}"
              STASH_STASH: /media/
              STASH_GENERATED: /generated/
              STASH_METADATA: /root/.stash
              STASH_CACHE: /cache/
            resources:
              requests:
                cpu: 500m
                memory: 750Mi
              limits:
                gpu.intel.com/i915: 1
                memory: 8Gi
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - apk add --no-cache youtube-dl python3 imagemagick libheif tesseract-ocr tesseract-ocr-data-eng
          uploader:
            image:
              repository: ghcr.io/adampetrovic/stash-uploader
              tag: 0.1.4@sha256:4fbf28ca55000b8d38ae50cdaa3d3b38fb3b3d176a252fd4e9b1ada837b78618
            env:
              TZ: "${TZ}"
              UPLOAD_DIR: /media
              PORT: "8080"
            probes:
              liveness: &uploaderProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *uploaderProbes
              startup:
                enabled: false
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 2048Mi
        pod:
          nodeSelector:
            intel.feature.node.kubernetes.io/gpu: "true"
    service:
      app:
        controller: tango
        ports:
          http:
            enabled: true
            port: 9999
      uploader:
        controller: tango
        ports:
          http:
            enabled: true
            port: 8080
    route:
      app:
        hostnames:
          - tango.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http
          - matches:
              - path:
                  type: PathPrefix
                  value: /upload
            backendRefs:
              - identifier: uploader
                port: http
          - matches:
              - path:
                  type: PathPrefix
                  value: /healthz
            backendRefs:
              - identifier: uploader
                port: http
    persistence:
      tango:
        enabled: true
        existingClaim: tango
        globalMounts:
          - path: /root/.stash
      media:
        type: nfs
        server: ${SECRET_NFS_DOMAIN}
        path: /volume2/stash/media
        globalMounts:
          - path: /media
      generated:
        type: nfs
        server: ${SECRET_NFS_DOMAIN}
        path: /volume2/stash/generated
        globalMounts:
          - path: /generated
      blob:
        type: nfs
        server: ${SECRET_NFS_DOMAIN}
        path: /volume2/stash/blob
        globalMounts:
          - path: /blob
      cache:
        enabled: true
        type: emptyDir
        globalMounts:
          - path: /cache
