---
web:
  port: ${CUSTOM_WEB_PORT}
storage:
  type: sqlite
  path: /config/sqlite.db
  caching: true
metrics: true
debug: false
ui:
  title: Status | Plexovic
  header: Plexovic Status
connectivity:
  checker:
    target: 1.1.1.1:53
    interval: 1m
alerting:
  telegram:
    token: ${TELEGRAM_BOT_TOKEN}
    id: ${TELEGRAM_CHAT_ID}
endpoints:
  - name: Plex Requests
    group: automation
    url: https://requests.${SECRET_PLEX_DOMAIN}
    interval: 1m
    ui:
        hide-hostname: true
        hide-url: false
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: telegram
        send-on-resolved: true

  # plex - lightweight health check
  - name: Plex
    group: plex
    url: http://plex.media.svc.cluster.local:32400/identity?X-Plex-Token=${PLEX_TOKEN}
    headers:
      Accept: application/json
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"
    alerts:
      - type: telegram
        send-on-resolved: true
        failure-threshold: 3
        success-threshold: 2

  # plex - library availability (less frequent, higher tolerance)
  - name: Plex Library
    group: plex
    url: http://plex.media.svc.cluster.local:32400/library/sections/1/all?X-Plex-Container-Size=1&X-Plex-Token=${PLEX_TOKEN}
    headers:
      Accept: application/json
    interval: 15m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[STATUS] == 200"
      - "[BODY].MediaContainer.size >= 1"
      - "[RESPONSE_TIME] < 10000"
    alerts:
      - type: telegram
        send-on-resolved: true
        failure-threshold: 3
        success-threshold: 2

  # downloaders
  - name: Sonarr - TV Downloader
    group: downloaders
    url: http://sonarr.media.svc.cluster.local/ping
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: telegram
        send-on-resolved: true
        failure-threshold: 3
        success-threshold: 2

  - name: Radarr - Movies Downloader
    group: downloaders
    url: http://radarr.media.svc.cluster.local/ping
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: telegram
        send-on-resolved: true
        failure-threshold: 3
        success-threshold: 2


  - name: QBT - Torrent Downloader
    group: downloaders
    url: http://qbittorrent.media.svc.cluster.local/api/v2/app/version
    interval: 1m
    ui:
        hide-hostname: true
        hide-url: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: telegram
        send-on-resolved: true

  - name: SABnzbd - Usenet Downloader
    group: downloaders
    url: http://sabnzbd.media.svc.cluster.local/api?mode=version
    interval: 1m
    ui:
        hide-hostname: true
        hide-url: true
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: telegram
        send-on-resolved: true

  - name: NAS Storage (NFS)
    group: storage
    url: "tcp://${SECRET_NFS_DOMAIN}:111"
    interval: 1m
    ui:
      hide-hostname: true
      hide-url: true
    conditions:
      - "[CONNECTED] == true"
