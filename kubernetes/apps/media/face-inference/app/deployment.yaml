apiVersion: apps/v1
kind: Deployment
metadata:
  name: face-inference
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: face-inference
  template:
    metadata:
      labels:
        app: face-inference
    spec:
      imagePullSecrets:
        - name: ghcr-private
      containers:
        - name: face-inference
          image: ghcr.io/adampetrovic/face-inference:v1
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: DET_SIZE
              value: "640"
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: media
              mountPath: /media
              readOnly: true
            - name: models
              mountPath: /models
      volumes:
        - name: media
          nfs:
            server: nas-direct.petrovic.network
            path: /volume2/stash/media
            readOnly: true
        - name: models
          emptyDir:
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: face-inference
  namespace: media
spec:
  selector:
    app: face-inference
  ports:
    - port: 8000
      targetPort: 8000
