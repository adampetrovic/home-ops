# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tracearr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  uninstall:
    keepHistory: false
  values:
    controllers:
      tracearr:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: tracearr-secret
            env:
              INIT_POSTGRES_HOST: tracearr-postgres-rw.media.svc.cluster.local
              INIT_POSTGRES_SUPER_USER:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-postgres-secret
                    key: username
              INIT_POSTGRES_SUPER_PASS:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-postgres-secret
                    key: password
              INIT_POSTGRES_DBNAME: tracearr
              INIT_POSTGRES_USER:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-postgres-secret
                    key: username
              INIT_POSTGRES_PASS:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-postgres-secret
                    key: password
        containers:
          app:
            image:
              repository: ghcr.io/connorgallopo/tracearr
              tag: 1.4.27@sha256:4802c793336ec2393de8db1088b0c8aa170c8b8b0aa7bba33a56a599c5d72544
            env:
              NODE_ENV: production
              PORT: &port 3000
              HOST: 0.0.0.0
              TZ: "${TZ}"
              REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379
              CORS_ORIGIN: "*"
              LOG_LEVEL: info
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-secret
                    key: DATABASE_URL
              JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-secret
                    key: JWT_SECRET
              COOKIE_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: tracearr-secret
                    key: COOKIE_SECRET
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1536Mi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            runAsNonRoot: true
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: tracearr
        ports:
          http:
            port: *port

    route:
      main:
        hostnames:
          - tracearr.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      backups:
        enabled: true
        type: emptyDir
        advancedMounts:
          tracearr:
            app:
              - path: /data/backup
