---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-rules
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: node-exporter
      rules:
        # Override of the default NodeSystemSaturation alert to exclude the
        # Synology NAS. The NAS regularly hits load/core > 2 during scheduled
        # data scrubs (btrfs scrub on a 78TB storage pool) which is expected
        # and not indicative of a problem.
        - alert: NodeSystemSaturation
          annotations:
            description: |
              System load per core at {{ $labels.instance }} has been above 2 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.
              This might indicate this instance resources saturation and can cause it becoming unresponsive.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemsaturation
            summary: System saturated, load per core is very high.
          expr: |-
            node_load1{job="node-exporter", instance!~"nas-direct.*"}
            / count without (cpu, mode) (node_cpu_seconds_total{job="node-exporter", instance!~"nas-direct.*", mode="idle"}) > 2
          for: 15m
          labels:
            severity: warning
