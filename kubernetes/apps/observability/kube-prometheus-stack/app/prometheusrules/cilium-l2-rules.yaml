---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cilium-l2-rules
  labels:
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: cilium-l2
      rules:
        - alert: CiliumL2AnnouncementNoLocalEndpoint
          annotations:
            summary: Cilium L2 VIP {{ $labels.lease }} is announced from {{ $labels.lease_holder }} without a local Envoy endpoint
            description: |
              Cilium's L2 announcement lease {{ $labels.lease }} is currently held by {{ $labels.lease_holder }}, but the matching Envoy LoadBalancer Service uses externalTrafficPolicy=Local and has no ready EndpointSlice endpoint on that node.

              This can cause the Gateway VIP to refuse connections even when Envoy pods, Services, and HTTPRoutes look healthy. It most commonly appears after rolling Talos/Kubernetes upgrades when Envoy pods and Cilium L2 leases settle on different nodes.

              Confirm the holder and endpoints with:
                kubectl get lease {{ $labels.lease }} -n kube-system
                kubectl get endpointslice -n network -l kubernetes.io/service-name=<envoy-service> -o wide
          expr: |-
            kube_lease_owner{namespace="kube-system", lease=~"cilium-l2announce-network-envoy-(internal|external)"}
            unless on (lease, lease_holder)
            (
              count by (lease, lease_holder) (
                label_replace(
                  label_replace(
                    kube_endpointslice_endpoints{namespace="network", ready="true", endpoint_nodename!="", endpointslice=~"envoy-(internal|external)-[a-z0-9]+"},
                    "lease", "cilium-l2announce-network-$1", "endpointslice", "^(envoy-(?:internal|external))-[a-z0-9]+$"
                  ),
                  "lease_holder", "$1", "endpoint_nodename", "(.+)"
                )
              ) > 0
            )
          for: 2m
          labels:
            severity: critical
