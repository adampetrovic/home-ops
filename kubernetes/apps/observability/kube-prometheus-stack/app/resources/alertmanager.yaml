---
global:
  resolve_timeout: 5m
route:
  group_by: ["alertname", "job"]
  group_interval: 10m
  group_wait: 1m
  receiver: telegram
  repeat_interval: 12h
  routes:
    - receiver: "null"
      matchers:
        - alertname =~ "InfoInhibitor|Watchdog"
      continue: false
    - receiver: telegram
      continue: true
      matchers:
        - severity = "critical"
    # WANDown → Home Assistant webhook for local push notifications.
    # Telegram won't work during an outage (no internet), but HA can
    # deliver notifications via local push over the WebSocket API
    # without needing Apple/Google push services.
    - receiver: homeassistant
      matchers:
        - alertname = "WANDown"
      continue: true
inhibit_rules:
  - equal: ["alertname", "namespace"]
    source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
  # During WAN outage (and for 10 min after recovery), suppress downstream
  # alerts. Uses WANDownBuffer which persists beyond WANDown to cover the
  # recovery window while pods restart, Flux re-reconciles, and targets
  # come back online. WANDown is also kept as a source so that inhibition
  # starts immediately (WANDownBuffer has for: 0s, but belt-and-suspenders).
  #
  # Flux: can't pull OCI artifacts without internet
  - source_matchers:
      - alertname =~ "WANDown|WANDownBuffer"
    target_matchers:
      - alertname =~ "KustomizationReconciliationFailure|FluxInstanceNotReady"
  # Alertmanager: can't reach Telegram API without internet
  - source_matchers:
      - alertname =~ "WANDown|WANDownBuffer"
    target_matchers:
      - alertname =~ "AlertmanagerFailedToSendAlerts|AlertmanagerClusterFailedToSendAlerts"
  # Pods/deployments/targets: services in ANY namespace may crash-loop or
  # become unavailable when internet is down (image pulls, cloud APIs, DNS).
  # Previously restricted to namespace=network which let media alerts through.
  - source_matchers:
      - alertname =~ "WANDown|WANDownBuffer"
    target_matchers:
      - alertname =~ "KubePodCrashLooping|KubeDeploymentReplicasMismatch|KubePodNotReady|TargetDown"
receivers:
  - name: "null"
  - name: homeassistant
    webhook_configs:
      - url: "http://home-assistant.automation.svc.cluster.local:8123/api/webhook/wan-status"
        send_resolved: true
  - name: telegram
    telegram_configs:
      - send_resolved: true
        chat_id: {{ .TELEGRAM_CHAT_ID }}
        bot_token: {{ .TELEGRAM_BOT_TOKEN }}
        parse_mode: "HTML"
        message: >-
          {{ "{{" }} define "__alert_severity_prefix_title" {{ "-}}" }}
            {{ "{{-" }} if eq .Status "firing" {{ "-}}" }}
              {{ "{{" }} if eq .CommonLabels.severity "info" {{ "-}}" }}
                ℹ️
              {{ "{{" }} else if eq .CommonLabels.severity "warning" {{ "-}}" }}
                ⚠️
              {{ "{{" }} else if eq .CommonLabels.severity "critical" {{ "-}}" }}
                🔴
              {{ "{{" }} else {{ "-}}" }}
                🔴
              {{ "{{-" }} end {{ "-}}" }}
            {{ "{{" }} else {{ "-}}" }}
            ✅
            {{ "{{-" }} end {{ "}}" }}
          {{ "{{-" }} end {{ "}}" }}

          {{ "{{" }} define "__alert_severity_title" {{ "-}}" }}
            <b>{{ "{{-" }} .Status | toUpper {{ "-}}" }}
            {{ "{{" }} if eq .Status "firing" {{ "}}" }}:{{ "{{" }} .Alerts.Firing | len {{ "}}" }}{{ "{{-" }} end {{ "}}" }}
            {{ "{{" }} template "__alert_severity_prefix_title" . {{ "}}" }} {{ "{{" }} .CommonLabels.alertname {{ "}}" }}</b>
          {{ "{{-" }} end {{ "}}" }}
          {{ "{{" }} define "__alert_severity_text" {{ "-}}" }}
            {{ "{{-" }} $alertsLen := (len .Alerts) {{ "-}}" }}
            {{ "{{" }} range .Alerts {{ "}}" }}
              {{ "{{-" }} if .Annotations.summary {{ "}}" }}
                <i>{{ "{{" }} .Annotations.summary {{ "}}" }}</i>
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} if .Annotations.description {{ "}}" }}
                <i>{{ "{{" }} .Annotations.description {{ "}}" }}</i>
              {{ "{{-" }} end {{ "}}" }}
              {{ "{{-" }} if le $alertsLen 5 {{ "}}" }}
                <a href="{{ "{{" }} .GeneratorURL {{ "}}" }}">Prometheus Link</a>
              {{ "{{-" }} end {{ "}}" }}
            {{ "{{" }} end {{ "}}" }}
          {{ "{{-" }} end {{ "}}" }}

          {{ "{{" }} template "__alert_severity_title" . {{ "}}" }}
          {{ "{{" }} template "__alert_severity_text" . {{ "}}" }}
