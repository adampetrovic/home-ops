---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: abb-cvc
spec:
  # Run daily at 01:00 AEST (15:00 UTC previous day)
  # Graphs are published once per day showing the previous day's data
  schedule: "0 15 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: abb-cvc
        spec:
          restartPolicy: OnFailure
          containers:
            - name: extract
              image: ghcr.io/adampetrovic/abb-cvc-extract:1.2.0@sha256:2a658d42795044cc13c922a4ffdf78ea64b22ff7d6b0501ffc1251812f55dec2
              args:
                - --poi
                - peakhurst
                - --poi
                - peakhurstlink2
                - --poi
                - peakhurstlink4
                - --yesterday
                - --write-influxdb
              envFrom:
                - secretRef:
                    name: abb-cvc-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
