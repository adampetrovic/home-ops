---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: abb-cvc
spec:
  # Run daily at 01:00 AEST (15:00 UTC previous day)
  # Graphs are published once per day showing the previous day's data
  schedule: "0 15 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: abb-cvc
        spec:
          restartPolicy: OnFailure
          containers:
            - name: extract
              image: python:3.13-slim@sha256:f41a75c9cee9391c09e0139f7b49d4b1fbb119944ec740ecce4040626dc07bed
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  # Install dependencies
                  pip install --quiet --no-cache-dir opencv-python-headless numpy urllib3

                  # Download the extraction script from the gist
                  python3 -c "
                  import urllib.request
                  urllib.request.urlretrieve(
                    'https://gist.githubusercontent.com/adampetrovic/da34ce978d2a65d6d55626bc108c2cf4/raw/abb-cvc-extract.py',
                    '/tmp/abb-cvc-extract.py'
                  )
                  print('Downloaded extraction script')
                  "

                  # Yesterday's date (graphs show previous day)
                  DATE=$(python3 -c "from datetime import datetime, timedelta, timezone; print((datetime.now(timezone.utc) + timedelta(hours=11) - timedelta(days=1)).strftime('%Y-%m-%d'))")
                  echo "Extracting CVC data for $DATE"

                  # Process each POI
                  while IFS= read -r poi; do
                    [ -z "$poi" ] && continue
                    echo "Processing POI: $poi"
                    OUTPUT=$(python3 /tmp/abb-cvc-extract.py --poi "$poi" --date "$DATE" 2>&1 1>/tmp/data.txt) || {
                      echo "Warning: failed to extract $poi: $OUTPUT"
                      continue
                    }
                    echo "$OUTPUT" >&2

                    # Write to InfluxDB
                    LINES=$(wc -l < /tmp/data.txt | tr -d ' ')
                    if [ "$LINES" -gt 0 ]; then
                      python3 -c "
                  import urllib.request, os
                  data = open('/tmp/data.txt', 'rb').read()
                  url = f'{os.environ[\"INFLUXDB_URL\"]}/api/v2/write?org={os.environ[\"INFLUXDB_ORG\"]}&bucket={os.environ[\"INFLUXDB_BUCKET\"]}&precision=s'
                  req = urllib.request.Request(url, data=data, method='POST', headers={
                      'Authorization': f'Token {os.environ[\"INFLUXDB_TOKEN\"]}',
                      'Content-Type': 'text/plain'
                  })
                  resp = urllib.request.urlopen(req)
                  print(f'  wrote {len(data)} bytes, HTTP {resp.status}')
                  "
                    else
                      echo "  $poi: no data extracted"
                    fi
                  done < /config/pois.txt

                  echo "Done"
              envFrom:
                - secretRef:
                    name: abb-cvc-secret
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: config
              configMap:
                name: abb-cvc-script
