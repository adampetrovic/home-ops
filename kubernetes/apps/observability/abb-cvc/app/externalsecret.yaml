---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: abb-cvc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: abb-cvc-secret
    template:
      data:
        INFLUXDB_URL: "https://influx.${SECRET_DOMAIN}"
        INFLUXDB_TOKEN: "{{ .GRAFANA_INFLUXDB_TOKEN }}"
        INFLUXDB_ORG: "{{ .ORG_ID }}"
        INFLUXDB_BUCKET: "abb-cvc"
  dataFrom:
    - extract:
        key: influxdb
