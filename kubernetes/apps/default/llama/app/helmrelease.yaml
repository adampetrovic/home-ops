---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama
spec:
  interval: 30m
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      llama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mirror.gcr.io/ollama/ollama
              tag: latest@sha256:cd33c5656285ca365c9c5495fe0240a70aef642088c6427c461fd54b62f80ffb
            env:
              TZ: ${TZ}
              HOME: /models
              OLLAMA_HOST: 0.0.0.0:11434
              OLLAMA_MODELS: /models
            command:
              - /bin/sh
              - -c
            args:
              - >-
                set -euo pipefail;
                ollama serve &
                pid=$!;
                trap 'kill ${pid}; wait ${pid}' EXIT INT TERM;
                until ollama list >/dev/null 2>&1; do sleep 2; done;
                ollama pull qwen3.6:27b;
                wait ${pid}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/version
                    port: http
                  periodSeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - ollama list | grep -q '^qwen3.6:27b'
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - ollama list | grep -q '^qwen3.6:27b'
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 180
            resources:
              requests:
                cpu: 2
                memory: 20Gi
              limits:
                cpu: 16
                memory: 40Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
        pod:
          nodeSelector:
            kubernetes.io/hostname: k8s-node-5
    service:
      app:
        controller: *app
        ports:
          http:
            primary: true
            port: 11434
    route:
      app:
        hostnames:
          - "llama.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      models:
        existingClaim: *app
        globalMounts:
          - path: /models
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
