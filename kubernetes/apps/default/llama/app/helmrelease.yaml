---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app llama
spec:
  interval: 30m
  timeout: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      llama:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/ggml-org/llama.cpp
              tag: server-b4735@sha256:479891625d5894c7d027b773026fd3f8778e6c5d8ab130e719835d14095f2291
            env:
              TZ: ${TZ}
              HF_HOME: /cache/huggingface
              HUGGINGFACE_HUB_CACHE: /cache/huggingface/hub
            args:
              - -hf
              - unsloth/Qwen3.6-27B-GGUF:Q4_K_M
              - --alias
              - qwen3.6-27b
              - --host
              - 0.0.0.0
              - --port
              - "8080"
              - -t
              - "16"
              - --threads-http
              - "4"
              - -np
              - "1"
              - -c
              - "32768"
              - --jinja
              - --temp
              - "0.6"
              - --top-p
              - "0.95"
              - --top-k
              - "20"
              - --min-p
              - "0.0"
              - --presence-penalty
              - "0.0"
              - --repeat-penalty
              - "1.0"
              - --metrics
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 30
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: http
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 180
            resources:
              requests:
                cpu: 4
                memory: 20Gi
              limits:
                cpu: 16
                memory: 36Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
        pod:
          nodeSelector:
            kubernetes.io/hostname: k8s-node-5
    service:
      app:
        controller: *app
        ports:
          http:
            primary: true
            port: 8080
    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: http
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    route:
      app:
        hostnames:
          - "llama.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      cache:
        existingClaim: *app
        globalMounts:
          - path: /cache
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
