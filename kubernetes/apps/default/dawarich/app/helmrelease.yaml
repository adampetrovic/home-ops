---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dawarich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      dawarich:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: dawarich-secret
        containers:
          app:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.6.1@sha256:a884f69f19ce0f66992f3872d24544d1e587e133b8a003e072711aafc1e02429
            command: ["web-entrypoint.sh"]
            args: ["bin/rails", "server", "-p", "3000", "-b", "::"]
            envFrom: *envFrom
            env:
              RAILS_ENV: production
              REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379
              APPLICATION_HOSTS: "dawarich.${SECRET_DOMAIN}"
              APPLICATION_PROTOCOL: http
              TIME_ZONE: "${TZ}"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"
              RAILS_LOG_TO_STDOUT: "true"
              PROMETHEUS_EXPORTER_ENABLED: "false"
              OIDC_CLIENT_ID: dawarich
              OIDC_ISSUER: "https://auth.${SECRET_DOMAIN}"
              OIDC_REDIRECT_URI: "https://dawarich.${SECRET_DOMAIN}/users/auth/openid_connect/callback"
              OIDC_PROVIDER_NAME: "Authelia"
              OIDC_AUTO_REGISTER: "true"
              ALLOW_EMAIL_PASSWORD_REGISTRATION: "false"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: &port 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
          sidekiq:
            image:
              repository: mirror.gcr.io/freikin/dawarich
              tag: 1.6.1@sha256:a884f69f19ce0f66992f3872d24544d1e587e133b8a003e072711aafc1e02429
            command: ["sidekiq-entrypoint.sh"]
            args: ["sidekiq"]
            envFrom: *envFrom
            env:
              RAILS_ENV: production
              REDIS_URL: redis://dragonfly.database.svc.cluster.local:6379
              APPLICATION_HOSTS: "dawarich.${SECRET_DOMAIN}"
              APPLICATION_PROTOCOL: http
              TIME_ZONE: "${TZ}"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"
              RAILS_LOG_TO_STDOUT: "true"
              BACKGROUND_PROCESSING_CONCURRENCY: "5"
              PROMETHEUS_EXPORTER_ENABLED: "false"
              OIDC_CLIENT_ID: dawarich
              OIDC_ISSUER: "https://auth.${SECRET_DOMAIN}"
              OIDC_REDIRECT_URI: "https://dawarich.${SECRET_DOMAIN}/users/auth/openid_connect/callback"
              OIDC_PROVIDER_NAME: "Authelia"
              OIDC_AUTO_REGISTER: "true"
              ALLOW_EMAIL_PASSWORD_REGISTRATION: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pgrep
                      - -f
                      - sidekiq
                  periodSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - pgrep
                      - -f
                      - sidekiq
                  periodSeconds: 10
                  failureThreshold: 6
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 4Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: dawarich
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "dawarich.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: *app
        advancedMounts:
          dawarich:
            app:
              - path: /var/app/public
                subPath: public
              - path: /var/app/storage
                subPath: storage
              - path: /var/app/tmp/imports/watched
                subPath: watched
            sidekiq:
              - path: /var/app/public
                subPath: public
              - path: /var/app/storage
                subPath: storage
              - path: /var/app/tmp/imports/watched
                subPath: watched
      initdb:
        type: configMap
        identifier: initdb
        advancedMounts:
          dawarich:
            init-db:
              - path: /initdb
    configMaps:
      initdb:
        data:
          dawarich.sql: |
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS postgis_topology;
