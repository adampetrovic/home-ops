---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app babybuddy
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      babybuddy:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
            envFrom: &envFrom
              - secretRef:
                  name: babybuddy-secret
        containers:
          babybuddy:
            image:
              repository: ghcr.io/linuxserver/babybuddy
              tag: 2.9.2@sha256:613814ab4be386bae905f41a5105ed27751d3f185d902d29714d4bc03a70acc0
            env:
              TZ: ${TZ}
              CSRF_TRUSTED_ORIGINS: https://baby.${SECRET_PUBLIC_DOMAIN}
              PUID: 1000
              PGID: 1000
              DB_ENGINE: django.db.backends.postgresql
              DEBUG: 'True'
              REVERSE_PROXY_AUTH: "True"
              PROXY_HEADER: HTTP_REMOTE_USER
              SECURE_PROXY_SSL_HEADER: "True"
            envFrom: *envFrom
    service:
      app:
        controller: babybuddy
        ports:
          http:
            primary: true
            port: 8000
    route:
      external:
        annotations:
          gatus.home-operations.com/enabled: "true"
        hostnames:
          - "baby.${SECRET_PUBLIC_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      config:
        type: emptyDir
