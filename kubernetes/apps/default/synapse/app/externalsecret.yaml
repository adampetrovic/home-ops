---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: synapse
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: synapse-secret
    template:
      engineVersion: v2
      data:
        # Postgres init container
        INIT_POSTGRES_DBNAME: synapse
        INIT_POSTGRES_HOST: postgres-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .SYNAPSE_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .SYNAPSE_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # Synapse signing key — mounted as a file
        signing.key: "{{ .SYNAPSE_SIGNING_KEY }}"
        # Log config — mounted as a file
        log.config: |
          version: 1
          formatters:
            precise:
              format: '%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s'
          handlers:
            console:
              class: logging.StreamHandler
              formatter: precise
          loggers:
            synapse.storage.SQL:
              level: INFO
          root:
            level: INFO
            handlers: [console]
          disable_existing_loggers: false
        # Synapse homeserver.yaml — mounted as a file
        homeserver.yaml: |
          server_name: "${SECRET_PUBLIC_ANON_DOMAIN}"
          public_baseurl: "https://matrix.${SECRET_PUBLIC_ANON_DOMAIN}/"
          web_client_location: "https://chat.${SECRET_PUBLIC_ANON_DOMAIN}/"
          pid_file: /tmp/homeserver.pid
          signing_key_path: /data/signing.key
          media_store_path: /data/media_store

          # Don't advertise a .well-known — federation is off
          serve_server_wellknown: false

          listeners:
            - port: 8008
              tls: false
              type: http
              x_forwarded: true
              bind_addresses: ["0.0.0.0"]
              resources:
                - names: [client]
                  compress: true

          database:
            name: psycopg2
            args:
              user: "{{ .SYNAPSE_POSTGRES_USER }}"
              password: "{{ .SYNAPSE_POSTGRES_PASS }}"
              database: synapse
              host: postgres-rw.database.svc.cluster.local
              port: 5432
              sslmode: disable
              cp_min: 5
              cp_max: 10

          # ─── Federation: fully disabled ────────────────────────────────
          federation_domain_whitelist: []
          allow_public_rooms_over_federation: false
          allow_profile_lookup_over_federation: false
          allow_device_name_lookup_over_federation: false
          federation_metrics_domains: []
          trusted_key_servers: []
          suppress_key_server_warning: true

          # ─── Registration: fully closed ────────────────────────────────
          enable_registration: false
          enable_registration_without_verification: false
          registration_requires_token: false
          disable_msisdn_registration: true
          allowed_local_3pids: []
          enable_3pid_lookup: false
          enable_set_displayname: true
          enable_set_avatar_url: true

          # ─── End-to-end encryption defaults ────────────────────────────
          encryption_enabled_by_default_for_room_type: all

          # ─── Media / uploads ───────────────────────────────────────────
          max_upload_size: 100M
          max_image_pixels: 32M
          url_preview_enabled: false
          dynamic_thumbnails: false

          # ─── Privacy / telemetry ───────────────────────────────────────
          report_stats: false
          allow_public_rooms_without_auth: false
          user_directory:
            enabled: true
            search_all_users: true

          # ─── Retention / misc ──────────────────────────────────────────
          password_config:
            enabled: true
            localdb_enabled: true
            policy:
              enabled: true
              minimum_length: 12
              require_digit: false
              require_symbol: false
              require_lowercase: false
              require_uppercase: false

          # ─── Logging ───────────────────────────────────────────────────
          log_config: "/data/log.config"

          # ─── Secrets ───────────────────────────────────────────────────
          registration_shared_secret: "{{ .SYNAPSE_REGISTRATION_SHARED_SECRET }}"
          macaroon_secret_key: "{{ .SYNAPSE_MACAROON_SECRET_KEY }}"
          form_secret: "{{ .SYNAPSE_FORM_SECRET }}"

          # ─── Presence ──────────────────────────────────────────────────
          presence:
            enabled: true

          # ─── Rate limits (relaxed for a small private server) ─────────
          rc_message:
            per_second: 1.0
            burst_count: 50
          rc_registration:
            per_second: 0.17
            burst_count: 3
          rc_login:
            address:
              per_second: 0.17
              burst_count: 3
            account:
              per_second: 0.17
              burst_count: 3
            failed_attempts:
              per_second: 0.17
              burst_count: 3
  dataFrom:
    - extract:
        key: synapse
      rewrite:
        - regexp:
            source: "(.*)"
            target: "SYNAPSE_$1"
    - extract:
        key: cloudnative-pg
