---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app synapse
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      synapse:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
            envFrom: &envFrom
              - secretRef:
                  name: synapse-secret
        containers:
          app:
            image:
              repository: ghcr.io/element-hq/synapse
              tag: v1.151.0@sha256:184dc8757daef019b511e7f96fc6e5edfb880fd074d8cf702c7e3aa899d188c8
            # Bypass the start.py wrapper so it doesn't try to regenerate
            # keys / touch mounted read-only files.
            command: ["python"]
            args:
              - "-m"
              - "synapse.app.homeserver"
              - "--config-path=/data/homeserver.yaml"
            env:
              TZ: ${TZ}
              SYNAPSE_CACHE_FACTOR: "1.0"
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8008
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "matrix.${SECRET_PUBLIC_ANON_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      # PVC for the media store (VolSync-managed)
      data:
        existingClaim: *app
        advancedMounts:
          synapse:
            app:
              - path: /data/media_store
                subPath: media_store
      # Synapse config + signing key + log config, from the ExternalSecret
      config:
        type: secret
        name: synapse-secret
        defaultMode: 256  # 0400 octal — read-only for owner
        advancedMounts:
          synapse:
            app:
              - path: /data/homeserver.yaml
                subPath: homeserver.yaml
              - path: /data/signing.key
                subPath: signing.key
              - path: /data/log.config
                subPath: log.config
      # Writable /tmp for pid file, etc.
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
