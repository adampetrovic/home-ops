# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app readeck
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      readeck:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: codeberg.org/readeck/readeck
              tag: 0.22.2@sha256:13fc370031543af7de0dbab84b3476ade6b77570e8dfffddbebdd7bfb8ffb387
            env:
              READECK_LOG_LEVEL: info
              READECK_LOG_FORMAT: text
              READECK_SERVER_HOST: 0.0.0.0
              READECK_SERVER_PORT: &port 8000
              # Authelia forwarded auth for web UI SSO.
              # IMPORTANT: /api, /bm, and /opds must be excluded from ext-auth
              # in your Authelia access_control rules. Readeck serves article
              # images from /bm/*, OPDS feeds from /opds/*, and the iOS app +
              # browser extension authenticate directly against /api/*.
              # See: authelia config & components/authelia-proxy
              READECK_AUTH_FORWARDED_ENABLED: "true"
              READECK_AUTH_FORWARDED_PROVISIONING: "true"
              # Use singular Remote-Group to avoid multi-group rejection.
              # Readeck expects exactly one group (user/staff/admin) but Authelia
              # sends all LDAP groups comma-separated. See: codeberg.org/readeck/readeck/issues/1155
              READECK_AUTH_FORWARDED_HEADER_GROUP: Remote-Group
            envFrom:
              - secretRef:
                  name: readeck-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
    service:
      app:
        controller: readeck
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "readeck.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /readeck
