---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sparkyfitness
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      sparkyfitness:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
              pullPolicy: Always
            envFrom: &envFrom
              - secretRef:
                  name: sparkyfitness-secret
        containers:
          app:
            image:
              repository: docker.io/codewithcj/sparkyfitness_server
              tag: v0.16.8@sha256:c151215e42367edc437f00b7e821e3ea19c09128815b9e9ee7a54de1b16e1cea
            envFrom: *envFrom
            env:
              TZ: ${TZ}
              SPARKY_FITNESS_DB_HOST: postgres-rw.database.svc.cluster.local
              SPARKY_FITNESS_DB_PORT: "5432"
              SPARKY_FITNESS_DB_NAME: sparkyfitness
              SPARKY_FITNESS_FRONTEND_URL: "https://sparkyfitness.${SECRET_DOMAIN}"
              SPARKY_FITNESS_DISABLE_SIGNUP: "false"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 512Mi
          frontend:
            image:
              repository: docker.io/codewithcj/sparkyfitness
              tag: v0.16.9@sha256:1778edf3cc5dd5f3c259d078791179f25b3cbf071cc78dfe9626d1ac953a8575
            env:
              SPARKY_FITNESS_SERVER_HOST: localhost
              SPARKY_FITNESS_SERVER_PORT: "3010"
              SPARKY_FITNESS_FRONTEND_URL: "https://sparkyfitness.${SECRET_DOMAIN}"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    service:
      app:
        controller: sparkyfitness
        ports:
          http:
            port: 80
    route:
      app:
        hostnames:
          - "sparkyfitness.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      uploads:
        existingClaim: *app
        advancedMounts:
          sparkyfitness:
            app:
              - path: /app/SparkyFitnessServer/uploads
