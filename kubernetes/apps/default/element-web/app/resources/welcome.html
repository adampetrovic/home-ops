<!--
  Instant redirect to the login page.

  Element loads this file via fetch() and inserts it into its auth layout
  with dangerouslySetInnerHTML. <script> tags are NOT executed by React's
  dangerouslySetInnerHTML, but inline event handlers on elements (e.g.
  <img onerror>) ARE processed by the browser when the element is parsed
  into the DOM. We use that to trigger an instant location.replace().

  A full-screen dark div is layered on top to hide any flash before the
  navigation completes.
-->
<style>
  .ch-redirect-mask {
    position: fixed;
    inset: 0;
    background: #0a0a0b;
    z-index: 2147483647;
    pointer-events: none;
  }
  /* Ensure Element's auth page background matches during the brief flash */
  .mx_AuthPage,
  .mx_Welcome,
  .mx_EmbeddedPage,
  .mx_EmbeddedPage_body {
    background: #0a0a0b !important;
  }
</style>
<div class="ch-redirect-mask" aria-hidden="true"></div>
<img
  src="x"
  alt=""
  style="display:none"
  onerror="window.location.replace(window.location.pathname + '#/login')"
/>
