---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app element-web
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    controllers:
      element-web:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: mirror.gcr.io/vectorim/element-web
              tag: v1.12.14@sha256:13052614150733892ff06189f0f9baf098bc16092bffc0e0e18ccf2f257abe34
            env:
              TZ: ${TZ}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "chat.${SECRET_PUBLIC_ANON_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
    persistence:
      # Custom branding bundle: config.json + welcome.html + svgs.
      # The ConfigMap is generated by Kustomize from app/resources/.
      assets:
        type: configMap
        name: element-web-assets
        advancedMounts:
          element-web:
            app:
              - path: /usr/share/nginx/html/config.json
                subPath: config.json
              - path: /usr/share/nginx/html/welcome.html
                subPath: welcome.html
              - path: /usr/share/nginx/html/welcome-bg.svg
                subPath: welcome-bg.svg
              - path: /usr/share/nginx/html/logo.svg
                subPath: logo.svg
              - path: /usr/share/nginx/html/custom.css
                subPath: custom.css
              - path: /etc/nginx/templates/default.conf.template
                subPath: default.conf.template
      # nginx entrypoint writes the rendered default.conf here from a template
      nginx-conf:
        type: emptyDir
        globalMounts:
          - path: /etc/nginx/conf.d
      nginx-cache:
        type: emptyDir
        globalMounts:
          - path: /var/cache/nginx
      nginx-run:
        type: emptyDir
        globalMounts:
          - path: /var/run
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
